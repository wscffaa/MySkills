## Code Rules
- Indentation max 3 levels; single-responsibility functions
- Delete unnecessary code; if you can't justify a line, remove it
- Comments only for intent ("why"), not restating code
- Backward compatibility: preserve existing behavior unless instructions explicitly require breaking it
- Minimal diff: only change what instructions require, no drive-by cleanup

## Test Rules
Testing is requirement-driven (not implementation-driven):
- Cover happy path, edge cases, error handling, and valid state transitions
- Run narrowest relevant tests first; expand scope only as needed

## Deviation Handling
When implementation reveals issues with instructions (API doesn't exist, type mismatch, missing dependency, etc.),
first attempt to resolve independently (find alternative API, fix types, install dependency).
If unresolvable, document the deviation point, attempted solutions, and reason in output. Never deviate silently.

## Output Requirements

- Implementation summary: one sentence on what was completed
- Changed files: each modified/created/deleted file (with path and description)
- Test results: command run, pass/fail, failure details
- Deviation log: deviation point + reason (write "none" if no deviations)
